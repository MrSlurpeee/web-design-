<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>

    <style>
      body {
        margin: 0;
        font-family: "Orbitron";
        background-color: #b70f0f;
      }

      .navbar {
        display: flex;
        justify-content: center;
        gap: 30px;
        background-color: #0effb3;
        padding: 15px;
      }

      .navbar a {
        text-decoration: none;
        color: #000;
        font-weight: bold;
        font-family: "Montserrat", inherit;
      }

      .navbar a:hover {
        color: white;
      }

      .contact {
        text-align: center;
        font-size: 23px;
        margin-top: 30px;
      }

      .info-table th,
      .info-table td {
        border: 3px #00aaaa;
        padding: 12px;
        text-align: center;
        border: 5px blue;
      }

      .info {
        list-style: none;
        text-align: center;
        font-size: 10px;
      }

      .footer {
        position: fixed;
        bottom: 10px;
        left: 10px;
      }

      .footer a {
        display: block;
        text-decoration: none;
        color: black;
      }
      .contact-form {
        width: 50%;
        margin: 40px auto;
        background-color: #0effb3;
        padding: 20px;
        border: 2px solid black;
      }

      .contact-form h2 {
        text-align: center;
      }

      .contact-form input,
      .contact-form textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #d54646;
        font-size: 16px;
        box-sizing: border-box;
      }

      .contact-form button {
        padding: 20px;
        background-color: #0f3294;
        color: rgb(0, 0, 0);
        border: none;
        cursor: pointer;
      }

      .contact-form button:hover {
        background-color: #333;
      }
    </style>
  </head>

  <body>
    <div class="navbar">
      <a href="index.html">Home</a>
      <a href="Product.html">Products</a>
      <a href="Contact.html">Contact</a>
    </div>

    <div class="contact">Contact</div>

    <table class="info-table">
      <tr>
        <th>Type</th>
        <th>Details</th>
      </tr>
      <tr>
        <td>Name</td>
        <td>Arun's Supreme Cookware</td>
      </tr>
      <tr>
        <td>Email</td>
        <td>SupremeCookware@gmail.com</td>
      </tr>
      <tr>
        <td>Phone</td>
        <td>610-192-2341</td>
      </tr>
    </table>

    <div class="contact-form">
      <h2>Send Us a Message</h2>

      <form>
        <label for="name">Name:</label><br />
        <input type="text" id="name" name="name" required /><br /><br />

        <label for="email">Email:</label><br />
        <input type="email" id="email" name="email" required /><br /><br />

        <label for="message">Message:</label><br />
        <textarea id="message" name="message" rows="5" required></textarea
        ><br /><br />

        <button type="submit">Submit</button>
      </form>
    </div>
    <div class="footer">Links</div>
  </body>
</html>
