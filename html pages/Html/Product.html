<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #db0606;
      }

      .navbar {
        display: flex;
        justify-content: center;
        gap: 30px;
        background-color: rgba(0, 0, 0, 0.2);
        padding: 15px;
      }

      .navbar a {
        text-decoration: none;
        color: #000;
        font-weight: bold;
      }

      .navbar a:hover {
        color: #fff;
      }

      .container {
        background-color: rgb(234, 78, 78);
        max-width: 900px;
        margin: 30px auto;
        padding: 20px;
        border-radius: 10px;
        text-align: center;
      }

      .products {
        font-size: 28px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-top: 20px;
      }

      .grid img {
        width: 100%;
        border-radius: 8px;
      }

      .footer {
        position: fixed;
        bottom: 10px;
        left: 10px;
        font-size: 14px;
      }

      .footer a {
        display: block;
        text-decoration: none;
        color: black;
      }
    </style>
  </head>

  <body>
    <div class="navbar">
      <a href="index.html">Home</a>
      <a href="Products.html">Products</a>
      <a href="Contact.html">Contact</a>
    </div>

    <div class="container">
      <div class="products">Products</div>

      <p>These products are as listed:</p>

      <ul style="text-align: left; display: inline-block">
        <li>Plates</li>
        <li>Bowls</li>
        <li>Mugs</li>
        <li>Pots</li>
        <li>Pans</li>
      </ul>

      <div class="grid">
        <img src="../CSS/cookware.png" alt="Cookware" />
        <img src="../CSS/pans.png" alt="Pans" />
      </div>
    </div>

    <div class="footer">Links</div>
  </body>
</html>
